<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            background: #2a2a3e;
            color: #fff;
            font-size: 2.2rem;
            text-align: right;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 80px;
            overflow-x: auto;
            word-wrap: break-word;
        }

        .history {
            font-size: 0.9rem;
            color: #888;
            min-height: 20px;
            text-align: right;
            margin-bottom: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 18px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #3a3a52;
            color: #fff;
            transition: all 0.15s;
            font-weight: 500;
        }

        button:hover {
            background: #4a4a6a;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .operator {
            background: #f5a623;
            color: #fff;
        }

        .operator:hover {
            background: #ffb84d;
        }

        .equals {
            background: #4caf50;
            grid-column: span 2;
        }

        .equals:hover {
            background: #5cbf60;
        }

        .clear {
            background: #e74c3c;
        }

        .clear:hover {
            background: #ff5a4a;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="history" id="history"></div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">←</button>
            <button class="operator" onclick="appendOp('%')">%</button>
            <button class="operator" onclick="appendOp('/')">÷</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOp('*')">×</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOp('-')">−</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOp('+')">+</button>

            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const history = document.getElementById('history');
        let current = '0';

        function updateDisplay() {
            display.textContent = current;
        }

        function appendNumber(num) {
            if (current === '0' && num !== '.') {
                current = num;
            } else {
                if (num === '.' && current.split(/[\+\-\*\/%]/).pop().includes('.')) return;
                current += num;
            }
            updateDisplay();
        }

        function appendOp(op) {
            const lastChar = current.slice(-1);
            if ('+-*/%'.includes(lastChar)) {
                current = current.slice(0, -1) + op;
            } else {
                current += op;
            }
            updateDisplay();
        }

        function clearDisplay() {
            current = '0';
            history.textContent = '';
            updateDisplay();
        }

        function deleteLast() {
            current = current.length > 1 ? current.slice(0, -1) : '0';
            updateDisplay();
        }

        function calculate() {
            try {
                const expression = current;
                const result = eval(expression);
                if (!isFinite(result)) throw new Error('Error');
                history.textContent = expression + ' =';
                current = String(Math.round(result * 1e10) / 1e10);
                updateDisplay();
            } catch (e) {
                display.textContent = 'Error';
                current = '0';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            else if (e.key === '.') appendNumber('.');
            else if ('+-*/%'.includes(e.key)) appendOp(e.key);
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Backspace') deleteLast();
            else if (e.key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
